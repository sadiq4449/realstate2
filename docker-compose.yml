# Local stack: MongoDB + API + SPA
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: realstat
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000
      PUBLIC_MEDIA_BASE_URL: http://localhost:8000/media
    ports:
      - "8000:8000"
    depends_on:
      - mongo
    volumes:
      - api_uploads:/app/uploads

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_WS_URL: ws://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  mongo_data:
  api_uploads:
